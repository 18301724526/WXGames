<!DOCTYPE html>
<!-- update prompt verification marker v3 -->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文明火种</title>
    <link rel="stylesheet" href="style.css?v=ui-state-shell-v1">
    <style>
        .login-panel { display:none; position:fixed; inset:0; background:var(--bg-primary); z-index:1000; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        .login-panel .login-box { background:var(--bg-panel); border:1px solid var(--border); border-radius:16px; padding:32px; width:100%; max-width:360px; text-align:center; }
        .login-panel h2 { margin-bottom:8px; font-size:24px; }
        .login-panel .login-msg { color:#e94560; font-size:14px; margin-bottom:16px; min-height:20px; }
        .login-panel input { width:100%; padding:12px; border-radius:8px; border:1px solid var(--border); background:var(--bg-card); color:var(--text-primary); margin-bottom:12px; font-size:14px; }
        .login-panel .login-btns { display:flex; gap:8px; }
        .login-panel .login-btns button { flex:1; padding:12px; border-radius:8px; border:none; cursor:pointer; font-size:14px; font-weight:bold; }
        .btn-login { background:var(--accent); color:#fff; }
        .login-panel .login-remember { display:flex; align-items:center; gap:8px; margin:4px 0 14px; color:var(--text-secondary); font-size:13px; }
        .login-panel .login-remember input { width:auto; margin:0; }
        .log-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; align-items:center; justify-content:center; padding:20px; }
        .log-modal-overlay.active { display:flex; }
        .log-modal-content { background:var(--bg-panel); border:1px solid var(--border); border-radius:16px; padding:20px; width:100%; max-width:560px; max-height:80vh; overflow:auto; }
        .log-modal-close { float:right; background:none; border:none; color:var(--text-secondary); font-size:18px; cursor:pointer; }
    </style>
</head>
<body>
    <div class="login-panel" id="loginPanel">
        <div class="login-box">
            <div style="font-size:48px;margin-bottom:8px;">🔥</div>
            <h2>文明火种</h2>
            <div class="login-msg" id="loginMessage"></div>
            <input type="text" id="loginUsername" placeholder="用户名" autocomplete="username" />
            <input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password" />
            <label class="login-remember" for="rememberPassword">
                <input type="checkbox" id="rememberPassword" />
                <span>记住密码</span>
            </label>
            <div class="login-btns">
                <button class="btn-login" id="btnLogin" type="button">登录</button>
            </div>
        </div>
    </div>

    <div id="app">
        <header class="top-bar">
            <div class="top-status-row">
                <div class="era-badge" id="eraBadge">
                    <span class="era-icon">🔥</span>
                    <span class="era-name" id="eraName">原始时代</span>
                </div>
            </div>
        </header>

        <div class="page-container">
            <section class="page page-resources active" data-page="resources"></section>

            <section class="page page-buildings" data-page="buildings"></section>

            <section class="page page-tech" data-page="tech"></section>

            <section class="page page-events" data-page="events"></section>

            <section class="page page-civilization" data-page="civilization">
                <section class="civ-overview-panel">
                    <div class="civ-overview-header">
                        <div class="civ-overview-era"><span id="civOverviewEraIcon">🔥</span><span id="civOverviewEraName">原始时代</span></div>
                        <div class="civ-overview-day" id="civOverviewDay">第 1 天</div>
                    </div>
                    <div class="civ-overview-stats">
                        <div class="civ-overview-item"><span class="civ-overview-icon">👥</span><span class="civ-overview-label">总人口</span><span class="civ-overview-value" id="civOverviewPop">3</span></div>
                        <div class="civ-overview-item"><span class="civ-overview-icon">🏠</span><span class="civ-overview-label">建筑</span><span class="civ-overview-value" id="civOverviewBuildings">0</span></div>
                        <div class="civ-overview-item"><span class="civ-overview-icon">🔬</span><span class="civ-overview-label">科技</span><span class="civ-overview-value" id="civOverviewTechs">0/0</span></div>
                        <div class="civ-overview-item"><span class="civ-overview-icon">😊</span><span class="civ-overview-label">幸福度</span><span class="civ-overview-value" id="civOverviewHappiness">100%</span></div>
                    </div>
                </section>

                <section class="era-panel">
                    <h2 class="panel-title">🏛️ 时代进阶</h2>
                    <div class="era-target"><span id="eraTargetIcon">🌾</span><span id="eraTargetName">农耕时代</span></div>
                    <div class="era-progress">
                        <div class="progress-bar"><div class="progress-fill" id="eraProgress" style="width: 0%"></div></div>
                        <div class="progress-label" id="eraProgressText">总进度: 0%</div>
                    </div>
                    <div class="era-conditions" id="eraConditions"></div>
                    <button class="btn-era" id="btnAdvanceEra" disabled>
                        <span class="btn-era-label" id="btnEraLabel">等待状态同步</span>
                    </button>
                </section>

                <section class="civ-features-panel">
                    <h2 class="panel-title">✨ 当前时代特性</h2>
                    <div class="civ-features-list"><div class="civ-feature-item">原始时代：口耳相传，等待迈入农耕时代。</div></div>
                </section>
            </section>

            <section class="page page-military" data-page="military">
                <div class="military-subtabs" id="militarySubTabs" role="tablist" aria-label="军事视图">
                    <button class="military-subtab active" type="button" data-military-view="army" aria-selected="true">军队</button>
                    <button class="military-subtab" type="button" data-military-view="scout" aria-selected="false">侦察</button>
                    <button class="military-subtab" type="button" data-military-view="world" aria-selected="false">世界</button>
                </div>

                <div class="military-subpage active" data-military-page="army">
                    <section class="military-panel" id="militaryPanel">
                        <h2 class="panel-title">🛡️ 军事</h2>
                        <div class="military-status">
                            <div class="military-unit-art"></div>
                            <div class="military-info">
                                <div class="military-row"><span>士兵</span><strong id="soldierCount">0/0</strong></div>
                                <div class="military-row"><span>防御</span><strong id="militaryDefense">0</strong></div>
                                <div class="military-progress">
                                    <div class="military-progress-label" id="soldierTrainingText">等待兵营</div>
                                    <div class="progress-bar"><div class="progress-fill" id="soldierTrainingProgress" style="width:0%"></div></div>
                                </div>
                            </div>
                        </div>
                    </section>
                    <section class="military-panel territory-summary-panel">
                        <h2 class="panel-title">🧭 出征状态</h2>
                        <div class="military-row"><span>可用士兵</span><strong id="availableSoldierCount">0</strong></div>
                        <div class="military-row"><span>出征中</span><strong id="soldiersOnMission">0</strong></div>
                    </section>
                </div>

                <div class="military-subpage" data-military-page="scout">
                    <section class="military-panel scout-panel">
                        <h2 class="panel-title">🧭 侦察</h2>
                        <div class="scout-status" id="scoutStatus">进入古典时代后可派出侦察队。</div>
                        <div class="scout-compass" id="scoutDirectionGrid"></div>
                    </section>
                </div>

                <div class="military-subpage" data-military-page="world">
                    <section class="territory-panel">
                        <div class="territory-header">
                            <div>
                                <h2 class="panel-title">🗺️ 世界</h2>
                                <div class="territory-polity" id="territoryPolityName">未命名势力</div>
                            </div>
                            <div class="territory-count" id="territoryCount">0 领土</div>
                        </div>
                        <div class="territory-grid" id="territoryGrid"></div>
                    </section>
                </div>
            </section>
        </div>

        <nav class="tab-bar">
            <button class="tab-btn active" id="tabResources" data-tab="resources"><span class="tab-icon">🌾</span><span class="tab-label">资源</span></button>
            <button class="tab-btn" id="tabBuildings" data-tab="buildings"><span class="tab-icon">🏗️</span><span class="tab-label">建造</span></button>
            <button class="tab-btn" id="tabTech" data-tab="tech"><span class="tab-icon">🔬</span><span class="tab-label">科技</span></button>
            <button class="tab-btn" id="tabEvents" data-tab="events"><span class="tab-icon">📜</span><span class="tab-label">事件</span></button>
            <button class="tab-btn" id="tabCivilization" data-tab="civilization"><span class="tab-icon">🔥</span><span class="tab-label">文明</span></button>
            <button class="tab-btn" id="tabMilitary" data-tab="military"><span class="tab-icon">🛡️</span><span class="tab-label">军事</span></button>
        </nav>

        <div class="modal-overlay" id="namingModal">
            <div class="modal-content naming-modal-content" role="dialog" aria-modal="true" aria-labelledby="namingTitle">
                <button class="modal-close" id="btnCloseNamingModal" type="button" aria-label="关闭">✕</button>
                <div class="modal-icon">🏛️</div>
                <h3 id="namingTitle">命名</h3>
                <p class="naming-message" id="namingMessage"></p>
                <input class="naming-input" id="namingInput" maxlength="12" />
                <button class="btn-claim" id="btnSubmitNaming">确定</button>
            </div>
        </div>

        <div class="modal-overlay" id="offlineModal">
            <div class="modal-content">
                <div class="modal-icon">⏰</div>
                <h3>离线收益</h3>
                <p>你离开了 <span id="offlineTime">0</span></p>
                <div class="offline-rewards">
                    <div class="reward-item"><span>🌾</span><span id="offlineFood">0</span></div>
                    <div class="reward-item"><span>📚</span><span id="offlineKnowledge">0</span></div>
                </div>
                <div class="offline-efficiency" id="offlineEfficiency">效率: 80%</div>
                <div class="offline-narrative" id="offlineNarrative">族人安稳度过了你离开的时间。</div>
                <button class="btn-claim" id="btnClaimOffline">领取收益</button>
            </div>
        </div>

        <div class="fx-layer" id="fxLayer"></div>
        <div class="tutorial-overlay" id="tutorialOverlay"></div>
        <div class="tutorial-bubble" id="tutorialBubble"></div>
        <div class="tutorial-pointer" id="tutorialPointer">👇</div>
    </div>

    <script src="floating-text.js?v=floating-adapter-v3"></script>
    <script src="js/config/GameConfig.js?v=update-check-interval-v2"></script>
    <script src="js/domain/BuildingState.js?v=settlement-era2-fix2"></script>
    <script src="js/domain/GameState.js?v=world-scout-v1"></script>
    <script src="js/state/GameStateManager.js?v=state-manager-building-v1"></script>
    <script src="js/state/UIStatePresenter.js?v=ui-state-v8"></script>
    <script src="js/api/GameAPI.js?v=version-cache-bust-v1"></script>
    <script src="js/platform/CanvasGameRenderer.js?v=canvas-game-renderer-v1"></script>
    <script src="js/platform/MiniGameCanvasRenderer.js?v=minigame-renderer-v2"></script>
    <script src="js/platform/H5CanvasGameRenderer.js?v=h5-game-renderer-v1"></script>
    <script src="js/services/GameStateSync.js?v=sync-scheduler-v2"></script>
    <script src="js/services/UpdateChecker.js?v=update-scheduler-v2"></script>
    <script src="js/ui/TerritoryUIRenderer.js?v=territory-presenter-v1"></script>
    <script src="js/ui/TutorialUIRenderer.js?v=tutorial-presenter-v1"></script>
    <script src="js/ui/LogModalAdapter.js?v=explicit-doc-v1"></script>
    <script src="js/ui/RuntimeLogAdapter.js?v=explicit-doc-v1"></script>
    <script src="js/ui/AuthShellAdapter.js?v=explicit-doc-v1"></script>
    <script src="js/ui/NamingModalAdapter.js?v=explicit-doc-v1"></script>
    <script src="js/ui/NavigationShellAdapter.js?v=explicit-doc-v1"></script>
    <script src="js/ui/CivilizationPanelAdapter.js?v=explicit-doc-v1"></script>
    <script src="js/ui/MilitaryPanelAdapter.js?v=explicit-doc-v1"></script>
    <script src="js/ui/TutorialTargetAdapter.js?v=explicit-doc-v1"></script>
    <script src="js/ui/TerritoryActionAdapter.js?v=explicit-doc-v1"></script>
    <script src="js/ui/H5GameBootstrap.js?v=h5-bootstrap-explicit-doc-v1"></script>
    <script src="js/ui/H5TextAdapter.js?v=explicit-doc-v1"></script>
    <script src="js/ui/H5UpdateRuntimeAdapter.js?v=h5-update-runtime-v5"></script>
    <script src="js/ui/H5AuthRuntimeAdapter.js?v=h5-auth-runtime-v2"></script>
    <script src="js/ui/H5AuthStorageAdapter.js?v=h5-storage-runtime-v1"></script>
    <script src="js/ui/H5TutorialStorageAdapter.js?v=h5-storage-runtime-v1"></script>
    <script src="js/ui/H5ShellAdapter.js?v=h5-shell-registry-v1"></script>
    <script src="js/controllers/BuildingController.js?v=canvas-building-actions-v1"></script>
    <script src="js/controllers/EventController.js?v=regular-events-v1"></script>
    <script src="js/controllers/TerritoryController.js?v=territory-rename-adapter-v1"></script>
    <script src="js/controllers/TutorialController.js?v=tutorial-scheduler-v1"></script>
    <script src="js/platform/H5CanvasRuntime.js?v=h5-canvas-runtime-v1"></script>
    <script src="js/platform/H5CanvasAppShell.js?v=h5-canvas-shell-v1"></script>
    <script src="app.js?v=h5-bootstrap-explicit-doc-v3"></script>
    <script src="auth.js?v=h5-module-deps-v1"></script>
    <script src="population.js?v=h5-module-deps-v1"></script>
    <script src="logs.js?v=h5-module-deps-v1"></script>
</body>
</html>
