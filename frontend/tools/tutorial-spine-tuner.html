<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutorial Spine Tuner</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1214;
      --panel: #171b1e;
      --line: rgba(238, 204, 135, 0.22);
      --text: #f1e7cf;
      --muted: #9fa9a6;
      --gold: #f0c36e;
      --green: #6f9d68;
      --water: #355f74;
      --soil: #72543c;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(360px, 1fr) 390px;
      background: var(--bg);
    }

    main {
      min-width: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0)),
        #101315;
    }

    .frame {
      position: relative;
      width: min(calc((100vh - 36px) * 9 / 16), calc(100vw - 444px));
      min-width: 320px;
      max-width: 430px;
      aspect-ratio: 9 / 16;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #0d1112;
    }

    .map {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(7, 10, 10, 0.25), rgba(7, 10, 10, 0.38)),
        conic-gradient(from 30deg at 52% 43%, var(--green), #8a9550, var(--soil), var(--green), var(--water), var(--green));
    }

    .grid {
      position: absolute;
      inset: -8%;
      opacity: 0.22;
      background-image:
        linear-gradient(30deg, transparent 48%, rgba(255, 235, 176, 0.5) 49%, rgba(255, 235, 176, 0.5) 51%, transparent 52%),
        linear-gradient(150deg, transparent 48%, rgba(255, 235, 176, 0.5) 49%, rgba(255, 235, 176, 0.5) 51%, transparent 52%);
      background-size: 56px 32px;
    }

    .topHud,
    .bottomHud {
      position: absolute;
      left: 0;
      right: 0;
      z-index: 6;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      align-items: center;
      height: 64px;
      padding: 0 8px;
      border-color: rgba(255, 222, 150, 0.18);
      background: rgba(14, 15, 15, 0.78);
      color: rgba(241, 231, 207, 0.78);
      font-size: 11px;
      text-align: center;
    }

    .topHud {
      top: 0;
      border-bottom: 1px solid rgba(255, 222, 150, 0.18);
    }

    .bottomHud {
      bottom: 0;
      height: 58px;
      border-top: 1px solid rgba(255, 222, 150, 0.18);
    }

    .city {
      position: absolute;
      left: 48%;
      top: 39%;
      z-index: 4;
      width: 74px;
      height: 54px;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255, 223, 86, 0.82);
      background: rgba(250, 219, 88, 0.23);
    }

    .finger {
      position: absolute;
      left: 57%;
      top: 43%;
      z-index: 8;
      width: 44px;
      height: 44px;
      color: #fff0a5;
      font-size: 40px;
      line-height: 44px;
      transform: rotate(-18deg);
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.6);
    }

    .clipLayer {
      position: absolute;
      z-index: 7;
      overflow: hidden;
      pointer-events: none;
      outline: 1px solid rgba(72, 220, 255, 0.6);
      outline-offset: -1px;
    }

    .targetBox {
      position: absolute;
      z-index: 9;
      pointer-events: none;
      border: 1px dashed rgba(255, 245, 173, 0.78);
    }

    canvas {
      position: absolute;
      display: block;
      pointer-events: none;
      background: transparent;
    }

    .dialogue {
      position: absolute;
      z-index: 10;
      right: 18px;
      bottom: 78px;
      min-height: 136px;
      padding: 18px 18px 16px 20px;
      border: 1px solid rgba(238, 204, 135, 0.35);
      border-radius: 8px;
      background: rgba(20, 17, 13, 0.94);
    }

    .name {
      margin-bottom: 8px;
      color: var(--gold);
      font-weight: 700;
      font-size: 15px;
    }

    .text {
      color: #f5e8c8;
      font-size: 14px;
      line-height: 1.55;
    }

    aside {
      height: 100vh;
      overflow: auto;
      padding: 16px;
      border-left: 1px solid var(--line);
      background: var(--panel);
    }

    h1 {
      margin: 0 0 6px;
      color: #fff3ca;
      font-size: 18px;
      letter-spacing: 0;
    }

    .hint,
    .readout {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .group {
      margin: 16px 0;
      padding-top: 12px;
      border-top: 1px solid rgba(238, 204, 135, 0.14);
    }

    .groupTitle {
      margin-bottom: 10px;
      color: #f5d795;
      font-size: 13px;
      font-weight: 700;
    }

    label {
      display: grid;
      gap: 7px;
      margin: 12px 0;
      color: rgba(241, 231, 207, 0.88);
      font-size: 13px;
    }

    .control {
      display: grid;
      grid-template-columns: 1fr 78px;
      gap: 10px;
      align-items: center;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--gold);
    }

    input[type="number"],
    textarea {
      border: 1px solid rgba(238, 204, 135, 0.28);
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.22);
      color: var(--text);
    }

    input[type="number"] {
      width: 78px;
      padding: 7px 8px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      padding: 10px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.45;
      resize: vertical;
    }

    button {
      width: 100%;
      min-height: 38px;
      margin-top: 10px;
      border: 1px solid rgba(238, 204, 135, 0.38);
      border-radius: 6px;
      background: #6f4d2b;
      color: #fff4cf;
      font-weight: 700;
      cursor: pointer;
    }

    .status {
      min-height: 18px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 860px) {
      body {
        display: block;
      }

      main {
        min-height: auto;
      }

      .frame {
        width: min(94vw, 430px);
      }

      aside {
        height: auto;
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="frame" id="frame">
      <div class="map"></div>
      <div class="grid"></div>
      <div class="topHud">
        <span>粮食<br>100</span><span>木材<br>0</span><span>石料<br>0</span>
        <span>铁矿<br>0</span><span>知识<br>7</span><span>人口<br>300</span>
      </div>
      <div class="city"></div>
      <div class="finger">☝</div>
      <div class="clipLayer" id="clipLayer">
        <canvas id="spineCanvas"></canvas>
      </div>
      <div class="targetBox" id="targetBox"></div>
      <div class="dialogue" id="dialogue">
        <div class="name">谋士</div>
        <div class="text">前方的雾散开了。这里背山临水，土地平整，是个建立据点的好地方。点一下首都看看。</div>
      </div>
      <div class="bottomHud">
        <span>科技</span><span>文明</span><span>名人</span><span>任务</span><span>设置</span><span></span>
      </div>
    </section>
  </main>

  <aside>
    <h1>Tutorial Spine Tuner</h1>
    <p class="hint">剪裁、缩放、位置分开调。蓝框是物理剪裁层，虚线框是视觉目标区；蓝框变化不应该改变角色大小。</p>

    <section class="group">
      <div class="groupTitle">视觉位置</div>
      <label>targetX
        <div class="control"><input id="targetX" type="range" min="-80" max="260" step="1"><input id="targetXNumber" type="number"></div>
      </label>
      <label>targetY
        <div class="control"><input id="targetY" type="range" min="0" max="520" step="1"><input id="targetYNumber" type="number"></div>
      </label>
      <label>targetWidth
        <div class="control"><input id="targetWidth" type="range" min="80" max="260" step="1"><input id="targetWidthNumber" type="number"></div>
      </label>
      <label>targetHeight
        <div class="control"><input id="targetHeight" type="range" min="160" max="520" step="1"><input id="targetHeightNumber" type="number"></div>
      </label>
    </section>

    <section class="group">
      <div class="groupTitle">Spine 相机</div>
      <label>viewScale
        <div class="control"><input id="viewScale" type="range" min="0.5" max="2.4" step="0.01"><input id="viewScaleNumber" type="number" step="0.01"></div>
      </label>
      <label>viewOffsetX
        <div class="control"><input id="viewOffsetX" type="range" min="-180" max="180" step="1"><input id="viewOffsetXNumber" type="number"></div>
      </label>
      <label>viewOffsetY
        <div class="control"><input id="viewOffsetY" type="range" min="-260" max="260" step="1"><input id="viewOffsetYNumber" type="number"></div>
      </label>
      <label>fitPadding
        <div class="control"><input id="fitPadding" type="range" min="0.82" max="1.3" step="0.01"><input id="fitPaddingNumber" type="number" step="0.01"></div>
      </label>
    </section>

    <section class="group">
      <div class="groupTitle">只影响剪裁</div>
      <label>clipPadding
        <div class="control"><input id="clipPadding" type="range" min="0" max="80" step="1"><input id="clipPaddingNumber" type="number"></div>
      </label>
    </section>

    <section class="group">
      <div class="groupTitle">对话框参考</div>
      <label>dialogueLeft
        <div class="control"><input id="dialogueLeft" type="range" min="80" max="190" step="1"><input id="dialogueLeftNumber" type="number"></div>
      </label>
    </section>

    <p class="readout" id="readout"></p>
    <textarea id="output" readonly></textarea>
    <button id="copy">复制参数</button>
    <button id="reset">重置</button>
    <div class="status" id="status">等待加载...</div>
  </aside>

  <script src="../js/vendor/spine-3.8/spine-webgl.js"></script>
  <script src="../js/platform/SpineWebglPlayer.js"></script>
  <script>
    const defaults = {
      targetX: 0,
      targetY: 433,
      targetWidth: 158,
      targetHeight: 330,
      viewScale: 1.41,
      viewOffsetX: 2,
      viewOffsetY: 85,
      fitPadding: 1,
      clipPadding: 4,
      dialogueLeft: 126,
    };

    const numericKeys = Object.keys(defaults);
    const state = { ...defaults };
    const frame = document.getElementById('frame');
    const clipLayer = document.getElementById('clipLayer');
    const targetBox = document.getElementById('targetBox');
    const canvas = document.getElementById('spineCanvas');
    const dialogue = document.getElementById('dialogue');
    const output = document.getElementById('output');
    const readout = document.getElementById('readout');
    const status = document.getElementById('status');
    let player = null;
    let bounds = null;

    function setStatus(message) {
      status.textContent = message;
    }

    function getFrameSize() {
      const rect = frame.getBoundingClientRect();
      return {
        width: Math.max(1, rect.width),
        height: Math.max(1, rect.height),
      };
    }

    function normalizeRect(rect) {
      const size = getFrameSize();
      const x = Math.max(0, Math.floor(Number(rect.x) || 0));
      const y = Math.max(0, Math.floor(Number(rect.y) || 0));
      const width = Math.max(1, Math.ceil(Number(rect.width) || 1));
      const height = Math.max(1, Math.ceil(Number(rect.height) || 1));
      return {
        x: Math.min(x, Math.floor(size.width - 1)),
        y: Math.min(y, Math.floor(size.height - 1)),
        width: Math.min(width, Math.max(1, Math.floor(size.width - x))),
        height: Math.min(height, Math.max(1, Math.floor(size.height - y))),
      };
    }

    function targetRect() {
      return normalizeRect({
        x: state.targetX,
        y: state.targetY,
        width: state.targetWidth,
        height: state.targetHeight,
      });
    }

    function deriveClipRect(target, sourceBounds) {
      const padding = Math.max(0, Number(state.clipPadding) || 0);
      let clip = {
        x: target.x - padding,
        y: target.y - padding,
        width: target.width + padding * 2,
        height: target.height + padding * 2,
      };
      const aspectRatio = Number(sourceBounds?.aspectRatio || sourceBounds?.width / Math.max(1, sourceBounds?.height));
      const baseAspect = target.width / Math.max(1, target.height);
      if (Number.isFinite(aspectRatio) && aspectRatio > 0 && Math.abs(baseAspect - aspectRatio) >= 0.015) {
        if (baseAspect > aspectRatio) {
          const nextWidth = Math.round(target.height * aspectRatio);
          clip.x = target.x + Math.round((target.width - nextWidth) / 2) - padding;
          clip.width = nextWidth + padding * 2;
        } else {
          const nextHeight = Math.round(target.width / aspectRatio);
          clip.y = target.y + Math.round((target.height - nextHeight) / 2) - padding;
          clip.height = nextHeight + padding * 2;
        }
      }
      return normalizeRect(clip);
    }

    function viewportRect(clip, target) {
      return {
        x: target.x - clip.x,
        y: target.y - clip.y,
        width: target.width,
        height: target.height,
      };
    }

    function renderControls() {
      numericKeys.forEach((key) => {
        const value = state[key];
        document.getElementById(key).value = value;
        document.getElementById(`${key}Number`).value = value;
      });
    }

    function applyLayout() {
      const target = targetRect();
      const clip = deriveClipRect(target, bounds);
      const viewport = viewportRect(clip, target);
      const ratio = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      clipLayer.style.left = `${clip.x}px`;
      clipLayer.style.top = `${clip.y}px`;
      clipLayer.style.width = `${clip.width}px`;
      clipLayer.style.height = `${clip.height}px`;
      targetBox.style.left = `${target.x}px`;
      targetBox.style.top = `${target.y}px`;
      targetBox.style.width = `${target.width}px`;
      targetBox.style.height = `${target.height}px`;
      const frameSize = getFrameSize();
      canvas.style.left = `${-clip.x}px`;
      canvas.style.top = `${-clip.y}px`;
      canvas.style.width = `${frameSize.width}px`;
      canvas.style.height = `${frameSize.height}px`;
      const nextCanvasWidth = Math.floor(frameSize.width * ratio);
      const nextCanvasHeight = Math.floor(frameSize.height * ratio);
      if (!player && canvas.width !== nextCanvasWidth) canvas.width = nextCanvasWidth;
      if (!player && canvas.height !== nextCanvasHeight) canvas.height = nextCanvasHeight;
      dialogue.style.left = `${state.dialogueLeft}px`;
      const params = {
        targetRect: target,
        view: {
          viewScale: Number(state.viewScale),
          viewOffsetX: Number(state.viewOffsetX),
          viewOffsetY: Number(state.viewOffsetY),
          fitPadding: Number(state.fitPadding),
        },
        clip: {
          mode: 'autoFromSkeletonBounds',
          previewClipRect: clip,
          clipPadding: Number(state.clipPadding),
        },
        dialogueLeft: Number(state.dialogueLeft),
      };
      readout.textContent = `target ${target.x},${target.y},${target.width}x${target.height} | clip ${clip.x},${clip.y},${clip.width}x${clip.height}`;
      output.value = JSON.stringify(params, null, 2);
      if (player) {
        player.logicalWidth = frameSize.width;
        player.logicalHeight = frameSize.height;
        player.maxDevicePixelRatio = ratio;
        player.setViewTransform({
          viewportRect: target,
          viewScale: state.viewScale,
          viewOffsetX: state.viewOffsetX,
          viewOffsetY: state.viewOffsetY,
          fitPadding: state.fitPadding,
        });
        player.resize();
      }
    }

    function bindControls() {
      numericKeys.forEach((key) => {
        const range = document.getElementById(key);
        const number = document.getElementById(`${key}Number`);
        const update = (value) => {
          const next = Number(value);
          state[key] = Number.isFinite(next) ? next : defaults[key];
          if (!['viewScale', 'fitPadding'].includes(key)) state[key] = Math.round(state[key]);
          range.value = state[key];
          number.value = state[key];
          applyLayout();
        };
        range.addEventListener('input', () => update(range.value));
        number.addEventListener('input', () => update(number.value));
      });
      document.getElementById('copy').addEventListener('click', async () => {
        await navigator.clipboard.writeText(output.value);
        setStatus('参数已复制');
      });
      document.getElementById('reset').addEventListener('click', () => {
        Object.assign(state, defaults);
        renderControls();
        applyLayout();
      });
    }

    function bootPlayer() {
      if (!window.SpineWebglPlayer?.isAvailable?.()) {
        setStatus('Spine 3.8 WebGL runtime 不可用');
        return;
      }
      const clip = deriveClipRect(targetRect(), bounds);
      const frameSize = getFrameSize();
      player = new window.SpineWebglPlayer({
        canvas,
        runtime: window,
        background: null,
        fitPadding: state.fitPadding,
        viewScale: state.viewScale,
        viewOffsetX: state.viewOffsetX,
        viewOffsetY: state.viewOffsetY,
        targetFps: 60,
        logicalWidth: frameSize.width,
        logicalHeight: frameSize.height,
        viewportRect: targetRect(),
        maxDevicePixelRatio: Math.min(2, window.devicePixelRatio || 1),
        premultipliedAlpha: false,
        preserveDrawingBuffer: false,
        onBounds: (event) => {
          bounds = event.bounds || bounds;
          applyLayout();
        },
        onStatus: (event) => {
          setStatus(`Spine: ${event.status}${event.detail ? ` / ${event.detail}` : ''}`);
        },
        onError: (error) => {
          setStatus(error?.message || String(error));
        },
      });
      const loaded = player.load({
        assetBase: '../assets/art/spine/tutorial/advisor/',
        jsonFile: 'tutorial_advisor.json',
        atlasFile: 'tutorial_advisor.atlas',
        animationName: 'animation',
        loop: true,
        alpha: true,
        antialias: true,
        fitPadding: state.fitPadding,
        viewScale: state.viewScale,
        viewOffsetX: state.viewOffsetX,
        viewOffsetY: state.viewOffsetY,
        targetFps: 60,
        preserveDrawingBuffer: false,
      });
      if (!loaded) setStatus('Spine 加载失败');
      window.__tutorialSpineTuner = { state, player, getParams: () => JSON.parse(output.value) };
    }

    renderControls();
    bindControls();
    applyLayout();
    bootPlayer();
    window.addEventListener('resize', applyLayout);
  </script>
</body>
</html>
