<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tile 大地图拼接验证台</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #101112;
      color: #f4e7ca;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }
    .shell {
      display: grid;
      grid-template-columns: minmax(330px, 390px) 1fr;
      height: 100vh;
      overflow: hidden;
    }
    .panel {
      height: 100vh;
      overflow-y: auto;
      padding: 16px;
      background: #1b1d20;
      border-right: 1px solid rgba(235, 206, 153, 0.16);
    }
    .stage {
      position: relative;
      height: 100vh;
      overflow: hidden;
      background: #0d1112;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: grab;
    }
    canvas.dragging { cursor: grabbing; }
    h1 {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
    }
    h2 {
      margin: 16px 0 8px;
      padding-top: 12px;
      border-top: 1px solid rgba(235, 206, 153, 0.12);
      font-size: 13px;
      letter-spacing: 0;
      color: #ffe3a6;
    }
    .row {
      display: grid;
      grid-template-columns: 82px 1fr 58px;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      margin: 7px 0;
      font-size: 12px;
    }
    .row input[type="range"] { width: 100%; }
    .row input[type="text"],
    .row select {
      width: 100%;
      min-width: 0;
      border: 1px solid rgba(235, 206, 153, 0.2);
      background: #101214;
      color: #f7e3b6;
      border-radius: 6px;
      padding: 5px 7px;
      font-size: 12px;
    }
    .value {
      text-align: right;
      color: #ffd98e;
      font-variant-numeric: tabular-nums;
    }
    .checks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 8px 0;
    }
    .check {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 6px 8px;
      border: 1px solid rgba(235, 206, 153, 0.14);
      border-radius: 6px;
      background: #23262a;
      color: #d6ccb7;
      font-size: 12px;
    }
    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    button {
      border: 1px solid rgba(235, 206, 153, 0.24);
      background: #34383d;
      color: #ffe0a0;
      border-radius: 6px;
      padding: 7px 8px;
      cursor: pointer;
      font-size: 12px;
    }
    button:active { transform: translateY(1px); }
    textarea {
      width: 100%;
      min-height: 170px;
      margin-top: 10px;
      resize: vertical;
      border: 1px solid rgba(235, 206, 153, 0.16);
      background: #0f1113;
      color: #eadfc8;
      border-radius: 8px;
      padding: 9px;
      font-family: Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
    }
    .hud {
      position: absolute;
      left: 14px;
      bottom: 14px;
      min-width: 220px;
      border: 1px solid rgba(235, 206, 153, 0.16);
      border-radius: 8px;
      background: rgba(18, 20, 22, 0.76);
      padding: 10px 12px;
      color: #f2e3c2;
      font-size: 12px;
      line-height: 1.55;
      pointer-events: none;
      backdrop-filter: blur(6px);
    }
    .hint {
      margin: 8px 0 0;
      color: #aeb3b8;
      font-size: 12px;
      line-height: 1.5;
    }
    @media (max-width: 860px) {
      .shell {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      .stage {
        order: 1;
        flex: 1 1 58vh;
        min-height: 360px;
      }
      .panel {
        order: 2;
        height: 42vh;
        min-height: 280px;
        border-right: 0;
        border-top: 1px solid rgba(235, 206, 153, 0.16);
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="panel">
      <h1>Tile 大地图拼接验证台</h1>
      <div class="row">
        <span>种子</span>
        <input id="seed" type="text" value="scout-tile-v1">
        <span class="value">seed</span>
      </div>
      <div class="row">
        <span>排布</span>
        <select id="layoutMode">
          <option value="iso">等距菱形</option>
          <option value="stagger">错行平铺</option>
        </select>
        <span class="value">mode</span>
      </div>
      <h2>拼接参数</h2>
      <div class="row">
        <span>地图半径</span>
        <input id="radius" type="range" min="2" max="9" value="5">
        <span class="value" id="radiusValue"></span>
      </div>
      <div class="row">
        <span>图片尺寸</span>
        <input id="tileSize" type="range" min="120" max="300" value="192">
        <span class="value" id="tileSizeValue"></span>
      </div>
      <div class="row">
        <span>横向步距</span>
        <input id="stepX" type="range" min="54" max="180" value="95">
        <span class="value" id="stepXValue"></span>
      </div>
      <div class="row">
        <span>纵向步距</span>
        <input id="stepY" type="range" min="26" max="120" value="70">
        <span class="value" id="stepYValue"></span>
      </div>
      <div class="row">
        <span>锚点 Y</span>
        <input id="anchorY" type="range" min="36" max="82" value="50">
        <span class="value" id="anchorYValue"></span>
      </div>
      <div class="row">
        <span>站点尺寸</span>
        <input id="siteScale" type="range" min="24" max="86" value="46">
        <span class="value" id="siteScaleValue"></span>
      </div>
      <h2>视口</h2>
      <div class="row">
        <span>缩放</span>
        <input id="zoom" type="range" min="45" max="180" value="105">
        <span class="value" id="zoomValue"></span>
      </div>
      <div class="checks">
        <label class="check"><input id="showSites" type="checkbox" checked> 地点</label>
        <label class="check"><input id="showFog" type="checkbox" checked> 雾边</label>
        <label class="check"><input id="showDebug" type="checkbox"> 锚点</label>
        <label class="check"><input id="showLabels" type="checkbox"> 坐标</label>
        <label class="check"><input id="animateWater" type="checkbox" checked> 水面</label>
      </div>
      <div class="buttons">
        <button id="resetView">重置视口</button>
        <button id="randomSeed">随机种子</button>
        <button id="copyParams">复制参数</button>
        <button id="fitMap">适配画面</button>
      </div>
      <textarea id="exportData" spellcheck="false"></textarea>
      <p class="hint">这里验证的是图片资源在地图上的拼接效果：拖动画面、滚轮缩放，调步距看接缝和遮挡；山脉、森林、河流都走透明美术叠加层。正式逻辑后续再接侦察显现。</p>
    </aside>
    <main class="stage">
      <canvas id="tileCanvas"></canvas>
      <div class="hud" id="hoverInfo">加载资源中...</div>
    </main>
  </div>
  <script src="tile-map-lab.js?v=0.1.179-tile-map-lab-land-coast-template-v2"></script>
</body>
</html>
