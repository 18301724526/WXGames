<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务表导入工具</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1ea;
      --ink: #20242a;
      --muted: #67727e;
      --line: #d6d1c6;
      --panel: #ffffff;
      --accent: #2f7d6b;
      --accent-dark: #215f52;
      --danger: #b33a3a;
      --soft: #e8f2ee;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .toolbar,
    .panel,
    .status {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) auto auto auto;
      gap: 12px;
      align-items: center;
      margin: 20px 0;
      padding: 14px;
    }

    input[type="file"] {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfaf7;
    }

    button,
    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 16px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }

    button.secondary,
    a.secondary {
      background: #fff;
      color: var(--accent-dark);
      border-color: var(--accent);
    }

    button:disabled {
      opacity: 0.52;
      cursor: not-allowed;
    }

    .grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 16px;
    }

    .panel {
      padding: 16px;
      min-height: 220px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 17px;
      letter-spacing: 0;
    }

    .meta {
      display: grid;
      gap: 10px;
    }

    .meta div {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee9de;
      color: var(--muted);
      font-size: 13px;
    }

    .meta strong {
      color: var(--ink);
      text-align: right;
      word-break: break-all;
    }

    .status {
      margin: 16px 0;
      padding: 12px 14px;
      color: var(--muted);
      background: #fbfaf7;
    }

    .status.ok {
      color: var(--accent-dark);
      background: var(--soft);
      border-color: #b9d7ce;
    }

    .status.error {
      color: var(--danger);
      background: #fff1ef;
      border-color: #e4b9b4;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      padding: 9px 10px;
      border-bottom: 1px solid #ece8df;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: #48525e;
      background: #f8f6f0;
      font-weight: 700;
    }

    td {
      color: #2f3842;
    }

    .errors {
      margin: 0;
      padding-left: 18px;
      color: var(--danger);
      line-height: 1.6;
    }

    @media (max-width: 820px) {
      header,
      .toolbar,
      .grid {
        display: block;
      }

      .toolbar > * {
        margin-top: 10px;
      }

      .panel {
        margin-top: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>任务表导入工具</h1>
        <p>选择任务 Excel 或 JSON，先预览校验，确认无误后提交到服务器。</p>
      </div>
      <button class="secondary" id="downloadTemplate" type="button">下载模板</button>
    </header>

    <section class="toolbar">
      <input id="fileInput" type="file" accept=".xlsx,.xls,.json,application/json,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
      <button id="previewButton">预览校验</button>
      <button id="importButton" disabled>提交服务器</button>
      <button id="refreshButton" class="secondary">刷新当前表</button>
    </section>

    <div id="status" class="status">等待选择文件。</div>

    <section class="grid">
      <aside class="panel">
        <h2>当前服务器任务表</h2>
        <div class="meta" id="currentMeta"></div>
      </aside>

      <section class="panel">
        <h2>预览结果</h2>
        <div id="preview"></div>
      </section>
    </section>
  </main>

  <script>
    const API_BASE = `${location.protocol}//${location.hostname}:3000/api`;
    const token = localStorage.getItem('cf_token') || localStorage.getItem('token') || '';
    const state = { file: null, contentBase64: '', preview: null };

    const fileInput = document.getElementById('fileInput');
    const previewButton = document.getElementById('previewButton');
    const importButton = document.getElementById('importButton');
    const refreshButton = document.getElementById('refreshButton');
    const statusEl = document.getElementById('status');
    const previewEl = document.getElementById('preview');
    const currentMetaEl = document.getElementById('currentMeta');
    const templateButton = document.getElementById('downloadTemplate');

    function setStatus(message, type = '') {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`.trim();
    }

    async function request(path, options = {}) {
      const response = await fetch(`${API_BASE}${path}`, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          Authorization: token ? `Bearer ${token}` : '',
          ...(options.headers || {}),
        },
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.message || data.error || `HTTP ${response.status}`);
      }
      return data;
    }

    function formatMeta(definitions = {}) {
      const summary = definitions.summary || {};
      const byCategory = summary.byCategory || {};
      currentMetaEl.innerHTML = [
        ['版本', definitions.version || '-'],
        ['哈希', definitions.hash || '-'],
        ['导入人', definitions.importedBy || '-'],
        ['导入时间', definitions.importedAt || '-'],
        ['来源', definitions.source || '-'],
        ['任务数', summary.totalCount ?? '-'],
        ['主线', byCategory.main ?? 0],
      ].map(([label, value]) => `<div><span>${label}</span><strong>${value}</strong></div>`).join('');
    }

    function renderPreview(definitions, errors = []) {
      if (errors.length) {
        previewEl.innerHTML = `<ul class="errors">${errors.map((error) => `<li>${error}</li>`).join('')}</ul>`;
        return;
      }
      const rows = (definitions.tasks || []).slice(0, 20).map((task) => `
        <tr>
          <td>${task.id}</td>
          <td>${task.category}</td>
          <td>${task.title}</td>
          <td>${task.rewardText || 'none'}</td>
          <td>${task.condition?.type || 'always'}</td>
        </tr>
      `).join('');
      previewEl.innerHTML = `
        <table>
          <thead>
            <tr><th>ID</th><th>分类</th><th>名称</th><th>奖励</th><th>条件</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || '').split(',')[1] || '');
        reader.onerror = () => reject(reader.error || new Error('文件读取失败'));
        reader.readAsDataURL(file);
      });
    }

    async function refreshCurrent() {
      if (!token) {
        setStatus('未检测到登录 token，请先在游戏页面登录，再打开本工具。', 'error');
        return;
      }
      const data = await request('/admin/task-definitions');
      formatMeta(data.definitions);
      setStatus('当前服务器任务表已刷新。', 'ok');
    }

    async function downloadTemplate() {
      if (!token) {
        setStatus('未检测到登录 token，请先在游戏页面登录，再打开本工具。', 'error');
        return;
      }
      const response = await fetch(`${API_BASE}/admin/task-definitions/template.xlsx`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      if (!response.ok) {
        const text = await response.text().catch(() => '');
        throw new Error(text || `HTTP ${response.status}`);
      }
      const blob = await response.blob();
      const href = URL.createObjectURL(blob);
      const anchor = document.createElement('a');
      anchor.href = href;
      anchor.download = 'task-definitions-template.xlsx';
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(href);
      setStatus('模板已下载。', 'ok');
    }

    async function previewImport() {
      const file = fileInput.files && fileInput.files[0];
      if (!file) {
        setStatus('请选择 .xlsx、.xls 或 .json 文件。', 'error');
        return;
      }
      state.file = file;
      state.contentBase64 = await readFileAsBase64(file);
      const data = await request('/admin/task-definitions/preview', {
        method: 'POST',
        body: JSON.stringify({ fileName: file.name, contentBase64: state.contentBase64 }),
      });
      state.preview = data.definitions;
      renderPreview(data.definitions, data.errors || []);
      importButton.disabled = !data.success;
      setStatus(data.success ? '预览校验通过，可以提交服务器。' : '预览校验未通过。', data.success ? 'ok' : 'error');
    }

    async function importDefinitions() {
      if (!state.file || !state.contentBase64) {
        setStatus('请先预览校验文件。', 'error');
        return;
      }
      const data = await request('/admin/task-definitions/import', {
        method: 'POST',
        body: JSON.stringify({ fileName: state.file.name, contentBase64: state.contentBase64 }),
      });
      formatMeta(data.definitions);
      renderPreview(data.definitions, data.errors || []);
      setStatus('任务表已提交到服务器。', 'ok');
    }

    previewButton.addEventListener('click', () => previewImport().catch((error) => setStatus(error.message, 'error')));
    importButton.addEventListener('click', () => importDefinitions().catch((error) => setStatus(error.message, 'error')));
    refreshButton.addEventListener('click', () => refreshCurrent().catch((error) => setStatus(error.message, 'error')));
    templateButton.addEventListener('click', () => downloadTemplate().catch((error) => setStatus(error.message, 'error')));
    fileInput.addEventListener('change', () => {
      state.preview = null;
      importButton.disabled = true;
      setStatus(fileInput.files?.[0] ? `已选择：${fileInput.files[0].name}` : '等待选择文件。');
    });

    refreshCurrent().catch((error) => setStatus(error.message, 'error'));
  </script>
</body>
</html>
