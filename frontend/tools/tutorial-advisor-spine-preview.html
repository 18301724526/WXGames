<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新手顾问 Spine 预览</title>
  <style>
    * { box-sizing: border-box; }
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #111316;
      color: #efe8d6;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }
    body {
      display: grid;
      grid-template-columns: minmax(260px, 320px) 1fr;
      min-height: 100vh;
      overflow: hidden;
    }
    aside {
      padding: 16px;
      border-right: 1px solid rgba(233, 205, 150, 0.16);
      background: #1b1d21;
    }
    h1 {
      margin: 0 0 14px;
      font-size: 18px;
      letter-spacing: 0;
      color: #fff0c8;
    }
    dl {
      margin: 0;
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 8px 10px;
      font-size: 12px;
      line-height: 1.4;
    }
    dt { color: #9ca7ad; }
    dd {
      margin: 0;
      color: #f4d997;
      word-break: break-all;
    }
    .status {
      margin-top: 16px;
      padding: 10px;
      border: 1px solid rgba(233, 205, 150, 0.16);
      border-radius: 8px;
      background: #111316;
      font-size: 12px;
      line-height: 1.5;
      color: #dfe2db;
    }
    .stage {
      min-height: 100vh;
      padding: 18px;
      background:
        linear-gradient(180deg, rgba(25, 31, 35, 0.96), rgba(10, 12, 13, 0.96)),
        #101113;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .frame {
      width: min(78vw, calc((100vh - 36px) * 0.56));
      height: min(calc(100vh - 36px), 88vw);
      min-width: 280px;
      min-height: 520px;
      border: 1px solid rgba(233, 205, 150, 0.18);
      border-radius: 8px;
      background:
        radial-gradient(circle at 50% 24%, rgba(247, 221, 163, 0.1), rgba(247, 221, 163, 0) 32%),
        #14100d;
      position: relative;
      overflow: hidden;
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    .floor {
      position: absolute;
      left: 11%;
      right: 11%;
      bottom: 4%;
      height: 18%;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.34), rgba(0, 0, 0, 0) 70%);
      pointer-events: none;
    }
    @media (max-width: 760px) {
      body {
        display: block;
        overflow: auto;
      }
      aside {
        border-right: 0;
        border-bottom: 1px solid rgba(233, 205, 150, 0.16);
      }
      .stage {
        min-height: 72vh;
      }
      .frame {
        width: min(92vw, 420px);
        height: min(72vh, 720px);
        min-height: 460px;
      }
    }
  </style>
</head>
<body>
  <aside>
    <h1>新手顾问 Spine 预览</h1>
    <dl>
      <dt>版本</dt>
      <dd>Spine 3.8.99 / WebGL</dd>
      <dt>资源</dt>
      <dd>assets/art/spine/tutorial/advisor</dd>
      <dt>动画</dt>
      <dd>animation</dd>
      <dt>Runtime</dt>
      <dd>js/vendor/spine-3.8/spine-webgl.js</dd>
    </dl>
    <div class="status" id="status">等待加载...</div>
  </aside>
  <main class="stage">
    <div class="frame">
      <canvas id="advisorCanvas" aria-hidden="true"></canvas>
      <div class="floor"></div>
    </div>
  </main>
  <script src="../js/vendor/spine-3.8/spine-webgl.js?v=spine38-local-20260604"></script>
  <script src="../js/platform/SpineWebglPlayer.js?v=tutorial-advisor-preview-20260604"></script>
  <script src="tutorial-advisor-spine-preview.js?v=20260604"></script>
</body>
</html>
