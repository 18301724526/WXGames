<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名人立绘分层试验台</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #161719;
      color: #efe5d0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }
    .shell {
      display: grid;
      grid-template-columns: minmax(340px, 420px) 1fr;
      height: 100vh;
      overflow: hidden;
    }
    .panel {
      height: 100vh;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 16px;
      background: #202124;
      border-right: 1px solid rgba(255, 229, 177, 0.14);
    }
    .stage {
      height: 100vh;
      overflow: auto;
      overscroll-behavior: contain;
      padding: 18px;
      background: #101113;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 18px;
      letter-spacing: 0;
    }
    .section {
      padding: 12px 0;
      border-top: 1px solid rgba(255, 229, 177, 0.12);
    }
    .section:first-of-type { border-top: 0; }
    .row {
      display: grid;
      grid-template-columns: 88px 1fr 48px;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      font-size: 12px;
    }
    .row input[type="range"] { width: 100%; }
    .value {
      text-align: right;
      color: #ffdfa6;
      font-variant-numeric: tabular-nums;
    }
    .layer-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .layer {
      border: 1px solid rgba(255, 229, 177, 0.14);
      border-radius: 8px;
      background: #27282c;
      padding: 10px;
    }
    .layer-head {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 6px;
      align-items: center;
      margin-bottom: 8px;
    }
    .layer-name {
      font-size: 13px;
      font-weight: 700;
      color: #fff0d0;
    }
    button {
      border: 1px solid rgba(255, 229, 177, 0.22);
      background: #34363c;
      color: #ffe6b5;
      border-radius: 6px;
      padding: 5px 8px;
      cursor: pointer;
      font-size: 12px;
    }
    button:active { transform: translateY(1px); }
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #cfc6b2;
    }
    textarea {
      width: 100%;
      min-height: 220px;
      resize: vertical;
      border: 1px solid rgba(255, 229, 177, 0.16);
      background: #111215;
      color: #e8dfcf;
      border-radius: 8px;
      padding: 10px;
      font-family: Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
    }
    canvas {
      display: block;
      background: #17130f;
      border: 1px solid rgba(255, 229, 177, 0.18);
      border-radius: 8px;
    }
    .hint {
      margin: 8px 0 0;
      color: #9fa4aa;
      font-size: 12px;
      line-height: 1.5;
    }
    @media (max-width: 900px) {
      html, body {
        height: auto;
        overflow: auto;
      }
      .shell {
        display: block;
        height: auto;
        overflow: visible;
      }
      .panel, .stage {
        height: auto;
        overflow: visible;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="panel">
      <h1>名人立绘分层试验台</h1>
      <div class="section">
        <div class="row">
          <span>整体缩放</span>
          <input id="globalScale" type="range" min="0" max="200" value="100">
          <span class="value" id="globalScaleValue"></span>
        </div>
        <div class="row">
          <span>整体 X</span>
          <input id="globalX" type="range" min="-180" max="180" value="0">
          <span class="value" id="globalXValue"></span>
        </div>
        <div class="row">
          <span>整体 Y</span>
          <input id="globalY" type="range" min="-220" max="220" value="0">
          <span class="value" id="globalYValue"></span>
        </div>
        <p class="hint">这里直接使用你切好的 PNG 原图。先在网页里调位置和缩放，调好后复制下面的 JSON 给我同步到游戏。</p>
      </div>
      <div class="section">
        <div class="layer-list" id="layerList"></div>
      </div>
      <div class="section">
        <button id="copyExport">复制参数</button>
        <button id="resetDefaults">重置</button>
        <p class="hint">这份参数只代表试验台调好的层级、缩放和坐标，不会自动改游戏运行时。</p>
        <textarea id="exportData" spellcheck="false"></textarea>
      </div>
    </aside>
    <main class="stage">
      <canvas id="stage" width="1120" height="900"></canvas>
    </main>
  </div>
  <script src="famous-portrait-lab.js?v=0.1.139-hair-anchor"></script>
</body>
</html>
