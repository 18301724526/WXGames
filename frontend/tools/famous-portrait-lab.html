<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名人立绘三层校准台</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #151617;
      color: #efe5d0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }
    .shell {
      display: grid;
      grid-template-columns: minmax(360px, 430px) 1fr;
      height: 100vh;
      overflow: hidden;
    }
    .panel {
      height: 100vh;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 16px;
      background: #202124;
      border-right: 1px solid rgba(255, 229, 177, 0.14);
    }
    .stage {
      height: 100vh;
      overflow: hidden;
      overscroll-behavior: contain;
      padding: 18px;
      background: #101113;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    h1 { margin: 0 0 12px; font-size: 18px; letter-spacing: 0; }
    .section { padding: 12px 0; border-top: 1px solid rgba(255, 229, 177, 0.12); }
    .section:first-of-type { border-top: 0; }
    .row {
      display: grid;
      grid-template-columns: 88px 1fr 56px;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      font-size: 12px;
    }
    .row input[type="range"] { width: 100%; }
    .row select {
      width: 100%;
      min-width: 0;
      border: 1px solid rgba(255, 229, 177, 0.18);
      background: #15161a;
      color: #ffe6b5;
      border-radius: 6px;
      padding: 5px 6px;
      font-size: 12px;
    }
    .value { text-align: right; color: #ffdfa6; font-variant-numeric: tabular-nums; }
    .layer-list { display: flex; flex-direction: column; gap: 8px; }
    .layer {
      border: 1px solid rgba(255, 229, 177, 0.14);
      border-radius: 8px;
      background: #27282c;
      padding: 10px;
    }
    .layer-head {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 6px;
      align-items: center;
      margin-bottom: 8px;
    }
    .layer-name { font-size: 13px; font-weight: 700; color: #fff0d0; }
    button {
      border: 1px solid rgba(255, 229, 177, 0.22);
      background: #34363c;
      color: #ffe6b5;
      border-radius: 6px;
      padding: 5px 8px;
      cursor: pointer;
      font-size: 12px;
    }
    button:active { transform: translateY(1px); }
    .toggle { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: #cfc6b2; }
    textarea {
      width: 100%;
      min-height: 240px;
      resize: vertical;
      border: 1px solid rgba(255, 229, 177, 0.16);
      background: #111215;
      color: #e8dfcf;
      border-radius: 8px;
      padding: 10px;
      font-family: Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
    }
    canvas {
      display: block;
      background: #17130f;
      border: 1px solid rgba(255, 229, 177, 0.18);
      border-radius: 8px;
      width: min(100%, calc((100vh - 36px) * 1.474));
      max-height: calc(100vh - 36px);
      height: auto;
    }
    .hint { margin: 8px 0 0; color: #9fa4aa; font-size: 12px; line-height: 1.5; }
    @media (max-width: 900px) {
      html, body { height: auto; overflow: auto; }
      .shell { display: block; height: auto; overflow: visible; }
      .panel, .stage { height: auto; overflow: visible; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="panel">
      <h1>名人立绘三层校准台</h1>
      <div class="section">
        <div class="row">
          <span>套装编号</span>
          <input id="variantIndex" type="range" min="1" max="10" value="1">
          <span class="value" id="variantIndexValue"></span>
        </div>
        <div class="row">
          <span>整体缩放</span>
          <input id="globalScale" type="range" min="0" max="200" value="100">
          <span class="value" id="globalScaleValue"></span>
        </div>
        <div class="row">
          <span>整体 X</span>
          <input id="globalX" type="range" min="-180" max="180" value="0">
          <span class="value" id="globalXValue"></span>
        </div>
        <div class="row">
          <span>整体 Y</span>
          <input id="globalY" type="range" min="-220" max="220" value="0">
          <span class="value" id="globalYValue"></span>
        </div>
        <p class="hint">套装编号会快速载入同编号三层；每层文件仍可单独切换。缩放锚点固定为 512 画布中心。</p>
      </div>
      <div class="section">
        <div class="layer-list" id="layerList"></div>
      </div>
      <div class="section">
        <button id="copyExport">复制参数</button>
        <button id="applyImport">导入参数</button>
        <button id="reloadAssets">刷新图片</button>
        <button id="resetDefaults">重置</button>
        <p class="hint">导出的 JSON 就是可以写回 `FamousPortraitLayout.js` 的坐标模型。你调完发我这段，我再实装到游戏默认参数。</p>
        <textarea id="exportData" spellcheck="false"></textarea>
      </div>
    </aside>
    <main class="stage">
      <canvas id="stage" width="1120" height="760"></canvas>
    </main>
  </div>
  <script src="../js/config/FamousPortraitLayout.js?v=famous-portrait-v3-upperbody-20260529"></script>
  <script src="famous-portrait-lab.js?v=0.3.1-v3-workbench"></script>
</body>
</html>
