<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>战斗场景 / Battle Scene Lab</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #0e1116; color: #e6edf3; font: 13px/1.4 -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100%; }
    #top { padding: 5px 10px; background: #11161d; border-bottom: 1px solid #2a3340; display: flex; gap: 14px; flex-wrap: wrap; font-variant-numeric: tabular-nums; }
    #top b { color: #58a6ff; }
    #status { color: #d29922; }
    #stageWrap { flex: 1; position: relative; overflow: hidden; }
    canvas { display: block; width: 100%; height: 100%; background: #0a0d12; }
    #ui { background: #161b22; border-top: 1px solid #2a3340; padding: 8px 10px 12px; }
    .row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 6px; }
    .row .label { color: #8b98a5; width: 56px; flex: none; }
    button { background: #30363d; color: #e6edf3; border: 1px solid #3a444f; border-radius: 6px; padding: 7px 10px; font-size: 13px; cursor: pointer; }
    button.sel { background: #1f6feb; border-color: #1f6feb; }
    button.master { background: #6e40c9; border-color: #6e40c9; }
    button:disabled { opacity: 0.4; }
    button.cd { color: #d29922; }
    #restart { background: #238636; border-color: #238636; }
    #result { position: absolute; left: 50%; top: 40%; transform: translate(-50%, -50%); min-width: 70%; background: rgba(13,17,23,0.95); border: 1px solid #2a3340; border-radius: 10px; padding: 14px 16px; font-size: 14px; line-height: 1.7; }
    #result h2 { margin: 0 0 8px; font-size: 18px; color: #58a6ff; }
    #result .side { color: #8b98a5; }
  </style>
</head>
<body>
  <div id="app">
    <div id="top">
      <span>tick <b id="m-tick">0</b></span>
      <span>我方在场 <b id="m-left">0</b></span>
      <span>敌方在场 <b id="m-right">0</b></span>
      <span>FPS <b id="m-fps">0</b></span>
      <span id="status">素材加载中…</span>
      <button id="restart">重开</button>
    </div>
    <div id="stageWrap"><canvas id="stage"></canvas><div id="result" hidden></div></div>
    <div id="ui">
      <div class="row"><span class="label">选将</span><span id="generals"></span></div>
      <div class="row"><span class="label">单部队令</span><span id="orders"></span></div>
      <div class="row"><span class="label">全军总令</span><span id="masters"></span></div>
      <div class="row"><span class="label">技能</span><span id="skills"></span></div>
    </div>
  </div>
  <script src="../shared/battleSimCore.js"></script>
  <script src="../shared/battleAI.js"></script>
  <script>
    (function () {
      'use strict';
      var Core = window.BattleSimCore;
      var canvas = document.getElementById('stage');
      var ctx = canvas.getContext('2d');
      var $ = function (id) { return document.getElementById(id); };
      if (!Core) { $('status').textContent = '加载 battleSimCore 失败(../shared/ 未发布?)'; $('status').style.color = '#f85149'; return; }

      // ---- sprites ----
      var SIDES = ['player', 'enemy'];
      var POSES = ['move', 'attack', 'die', 'idle'];
      var FRAMES = 4, FRAME_MS = 130;
      var img = { player: {}, enemy: {} };
      var loaded = 0, total = SIDES.length * POSES.length * FRAMES, ready = false;
      SIDES.forEach(function (side) {
        POSES.forEach(function (pose) {
          img[side][pose] = [];
          for (var i = 0; i < FRAMES; i++) {
            var im = new Image();
            im.onload = function () { loaded++; if (loaded >= total) { ready = true; $('status').textContent = '就绪'; $('status').style.color = '#3fb950'; } };
            im.src = '../assets/art/battle/units/' + side + '/' + pose + '/' + String(i + 1).padStart(2, '0') + '.png';
            img[side][pose].push(im);
          }
        });
      });

      // ---- setup ----
      var ORDER_LABELS = [
        ['soldierAttack', '士兵出击'], ['generalCharge', '武将出击'],
        ['generalRetreat', '武将后退'], ['defend', '防御'], ['cover', '掩护'],
      ];
      function makeSkills() {
        // Data-driven: a 怒气大招 (rage-gated AoE) + a 小技能 (cooldown buff).
        return [
          { id: 'ult', name: '大招', kind: 'ultimate', effect: 'aoeDamage', params: { radius: 90, damage: 40 }, rageCost: 100, cooldownTicks: 120, auto: false },
          { id: 'minor', name: '小技', kind: 'minor', effect: 'rallyAtk', params: { mult: 1.5 }, cooldownTicks: 100, auto: false },
        ];
      }
      function makeGeneral(gid, force, command, speed, soldiers) {
        return { gid: gid, attributes: { force: force, command: command, speed: speed }, soldiers: soldiers,
          stats: { hp: 200 + force * 4, atk: 20 + force * 0.6, def: command * 0.4, range: 16, moveSpeed: 60, atkSpeed: Math.max(5, Math.round(20 - speed * 0.12)), skills: makeSkills() },
          troop: { count: soldiers, template: { hp: 22, atk: 6, def: 2, range: 11, moveSpeed: 55, atkSpeed: 12 } } };
      }
      var W = 0, H = 0, dpr = 1, ARENA = { w: 0, h: 0 };
      var battle = null, selectedGid = null, pending = [], inputLog = [], runSeed = 1;

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 3);
        var r = canvas.getBoundingClientRect();
        W = Math.max(1, Math.floor(r.width)); H = Math.max(1, Math.floor(r.height));
        canvas.width = Math.floor(W * dpr); canvas.height = Math.floor(H * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      window.addEventListener('resize', resize);

      function newBattle() {
        resize();
        ARENA = { w: W, h: H };
        runSeed = (runSeed * 1103515245 + 12345) & 0x7fffffff;
        var setup = {
          seed: runSeed,
          arena: ARENA,
          sides: [
            { side: 'player', generals: [makeGeneral('L1', 80, 70, 60, 150), makeGeneral('L2', 65, 60, 50, 150)] },
            { side: 'enemy', generals: [makeGeneral('R1', 70, 65, 55, 160), makeGeneral('R2', 60, 55, 45, 160)] },
          ],
        };
        battle = Core.createBattle(setup);
        // Default is hold/待命; the enemy side is driven by the behavior-tree AI.
        // Enemy generals auto-cast their skills (simple AI use of the same system).
        Object.keys(battle.squads).forEach(function (gid) {
          if (battle.squads[gid].side !== 1) return;
          var eg = battle.units[battle.squads[gid].generalId];
          (eg.skills || []).forEach(function (sk) { sk.auto = true; });
        });
        selectedGid = 'L1';
        pending = []; inputLog = []; rstate = {};
        $('result').hidden = true;
        buildUi();
      }

      // ---- UI ----
      function buildUi() {
        var gel = $('generals'); gel.innerHTML = '';
        Object.keys(battle.squads).forEach(function (gid) {
          if (battle.squads[gid].side !== 0) return;
          var b = document.createElement('button');
          b.textContent = gid;
          b.onclick = function () { selectedGid = gid; buildUi(); };
          if (gid === selectedGid) b.className = 'sel';
          gel.appendChild(b);
        });
        var oel = $('orders'); oel.innerHTML = '';
        ORDER_LABELS.forEach(function (pair) {
          var b = document.createElement('button');
          var sq = battle.squads[selectedGid];
          var cd = sq ? sq.orderCdLeft : 0;
          b.textContent = pair[1] + (cd > 0 ? ' (' + Math.ceil(cd / 20) + 's)' : '');
          if (cd > 0) b.className = 'cd';
          b.disabled = !!battle.result;
          b.onclick = function () { issue({ type: 'order', gid: selectedGid, order: pair[0] }); };
          oel.appendChild(b);
        });
        var mel = $('masters'); mel.innerHTML = '';
        [['allOut', '全军出击'], ['allRetreat', '全军撤退']].forEach(function (pair) {
          var b = document.createElement('button');
          b.className = 'master';
          b.textContent = pair[1];
          b.disabled = !!battle.result || !!battle.masterUsed[0][pair[0]];
          b.onclick = function () { issue({ type: 'order', side: 0, order: pair[0] }); };
          mel.appendChild(b);
        });
        var sel = $('skills'); sel.innerHTML = '';
        var g = battle.units[battle.squads[selectedGid].generalId];
        (g.skills || []).forEach(function (sk, idx) {
          var b = document.createElement('button');
          var rageMax = battle.config.rageMax;
          var ready = Core.skillReady(battle, g, sk, idx);
          var info = sk.kind === 'ultimate'
            ? '怒' + Math.floor(g.rage) + '/' + (sk.rageCost || rageMax)
            : (g.skillCds[idx] > 0 ? Math.ceil(g.skillCds[idx] / 20) + 's' : '就绪');
          b.textContent = sk.name + ' [' + info + ']';
          if (!ready) b.className = 'cd';
          b.disabled = !!battle.result || !ready;
          b.onclick = function () { issue({ type: 'skill', gid: selectedGid, skillId: sk.id }); };
          sel.appendChild(b);
          var lab = document.createElement('label');
          lab.style.cssText = 'margin-left:2px;color:#8b98a5';
          var cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = !!sk.auto;
          cb.onchange = function () { sk.auto = cb.checked; };
          lab.appendChild(cb);
          lab.appendChild(document.createTextNode('自动'));
          sel.appendChild(lab);
        });
      }
      function issue(input) { pending.push(input); inputLog.push(Object.assign({ tick: battle.tick }, input)); }

      // ---- loop ----
      var TICK_DT = 1 / 20, acc = 0, last = 0, fpsBuf = [];
      function frame(now) {
        if (!last) last = now;
        var dt = (now - last) / 1000; last = now; if (dt > 0.25) dt = 0.25;
        fpsBuf.push(1 / Math.max(dt, 0.0001)); if (fpsBuf.length > 20) fpsBuf.shift();
        acc += dt;
        var uiDirty = false;
        var steps = 0;
        while (acc >= TICK_DT && steps < 5 && battle && !battle.result) {
          var aiIns = window.BattleAI ? window.BattleAI.decideSideOrders(battle, 1) : [];
          var ins = pending.concat(aiIns); pending = [];
          if (ins.length) uiDirty = true;
          Core.step(battle, ins);
          acc -= TICK_DT; steps++;
        }
        render(now);
        updateTop();
        frame._n = (frame._n || 0) + 1;
        if (uiDirty || frame._n % 15 === 0 || (battle && battle.result && !frame._ended)) {
          buildUi();
          if (battle && battle.result && !frame._ended) { frame._ended = true; showResult(); }
        }
        requestAnimationFrame(frame);
      }

      // Extensible (兵种, 状态)->(精灵集, 动画) resolver. Temp art is keyed by side;
      // when real per-兵种 sprites arrive, spriteSetFor() switches on u.unitType.
      // Unknown states fall back to 'move', so new states never break rendering.
      var STATE_POSE = { engage: 'attack', hold: 'idle', covering: 'move', advance: 'move', retreat: 'move', dead: 'die' };
      function spriteSetFor(u) { return u.side === 0 ? 'player' : 'enemy'; }
      function poseFor(u) { return STATE_POSE[u.state] || 'move'; }

      var rstate = {}; // render-only per-unit: facing(fx) + prev x
      function render(now) {
        ctx.clearRect(0, 0, W, H);
        if (!battle) return;
        var sx = W / ARENA.w, sy = H / ARENA.h;
        var base = (now / FRAME_MS) | 0;
        var us = battle.units;
        // collect alive units, update facing, sort by depth (y) for overlap.
        var draw = [];
        for (var i = 0; i < us.length; i++) {
          var u = us[i];
          if (!u.alive || u.left) continue;
          var rs = rstate[u.id] || (rstate[u.id] = { fx: u.side === 0 ? 1 : -1, px: u.x });
          if (u.x > rs.px + 0.05) rs.fx = 1;
          else if (u.x < rs.px - 0.05) rs.fx = -1;
          rs.px = u.x;
          draw.push(u);
        }
        draw.sort(function (a, b) { return a.y - b.y; });
        for (var j = 0; j < draw.length; j++) {
          var d = draw[j];
          var h = d.kind === 'general' ? 46 : 16;
          var w = Math.round((h * 500) / 400);
          var x = d.x * sx, y = d.y * sy;
          var drew = false;
          if (ready) {
            var fr = img[spriteSetFor(d)][poseFor(d)][(base + (d.id % FRAMES)) % FRAMES];
            if (fr && fr.complete && fr.naturalWidth) {
              if (rstate[d.id].fx < 0) {
                ctx.save();
                ctx.translate(x, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(fr, -w / 2, y - h, w, h);
                ctx.restore();
              } else {
                ctx.drawImage(fr, x - w / 2, y - h, w, h);
              }
              drew = true;
            }
          }
          if (!drew) dot(d, x, y);
          if (d.kind === 'general') { ctx.fillStyle = d.side === 0 ? '#3fb950' : '#f0c000'; ctx.fillRect(x - 2, y - h - 6, 4, 4); }
        }
      }
      function dot(u, x, y) { ctx.fillStyle = u.side === 0 ? '#f0564b' : '#4a9bf0'; ctx.fillRect(x - 1.5, y - 1.5, 3, 3); }

      function updateTop() {
        if (!battle) return;
        var c = Core.countOnField(battle);
        $('m-tick').textContent = battle.tick;
        $('m-left').textContent = c[0]; $('m-right').textContent = c[1];
        var fps = fpsBuf.reduce(function (a, b) { return a + b; }, 0) / (fpsBuf.length || 1);
        $('m-fps').textContent = fps.toFixed(0);
        if (battle.result) { $('status').textContent = '结束 — 胜者: ' + battle.result.winner; $('status').style.color = '#58a6ff'; }
      }

      function showResult() {
        var r = battle && battle.result;
        if (!r) return;
        var sv = r.survivorsByGid || {};
        function sideLine(side) {
          var parts = [], total = 0;
          Object.keys(battle.squads).forEach(function (gid) {
            if (battle.squads[gid].side !== side) return;
            var n = Math.floor(sv[gid] || 0);
            total += n;
            parts.push(gid + ' ' + n);
          });
          return parts.join(' , ') + '  (总 ' + total + ')';
        }
        var win = r.winner === 'player' ? '我方胜' : r.winner === 'enemy' ? '敌方胜' : '平局';
        $('result').innerHTML =
          '<h2>' + win + '</h2>' +
          '<div><span class="side">我方剩余:</span> ' + sideLine(0) + '</div>' +
          '<div><span class="side">敌方剩余:</span> ' + sideLine(1) + '</div>' +
          '<div class="side" style="margin-top:6px;font-size:12px">用时 ' + r.ticks +
          ' tick · 输入流 ' + inputLog.length + ' 条(后端可凭此重算校验)</div>';
        $('result').hidden = false;
      }

      $('restart').onclick = function () { frame._ended = false; newBattle(); };
      newBattle();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
