name: Test Server CI

on:
  push:
    branches:
      - codex/battle-core-test-server
  pull_request:
    branches:
      - codex/battle-core-test-server

jobs:
  test-server-gate:
    name: Test server deploy gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Run test server gate
        run: bash scripts/test-server-ci-gate.sh .
